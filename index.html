<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>アクキー・アクスタ AR</title>
  <meta
    name="description"
    content="iPhoneではQuick Lookで純正ARを開き、3Dモデルをそのまま空間に表示するミニマルな静的ページです。"
  />
  <link rel="icon" href="data:," />
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    :root {
      --bg: #120d09;
      --accent: #ff9d5c;
      --text: #f8f2eb;
      --line: rgba(255, 220, 187, 0.18);
      --shadow: 0 18px 46px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 80%, rgba(255, 157, 92, 0.12), transparent 20%),
        radial-gradient(circle at top, rgba(255, 157, 92, 0.1), transparent 34%),
        var(--bg);
    }

    body {
      font-family: "Hiragino Sans", "Noto Sans JP", "Segoe UI", sans-serif;
      color: var(--text);
    }

    .app {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    model-viewer {
      width: 100%;
      height: 100%;
      background: transparent;
      --poster-color: transparent;
    }

    .surface {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 72%, rgba(255, 186, 131, 0.16), transparent 16%);
    }

    .cta-wrap {
      position: absolute;
      left: 50%;
      bottom: calc(20px + env(safe-area-inset-bottom, 0px));
      transform: translateX(-50%);
      z-index: 5;
      pointer-events: none;
    }

    #ar-button {
      pointer-events: auto;
      border: none;
      border-radius: 999px;
      padding: 14px 22px;
      font: inherit;
      font-weight: 800;
      color: #fff;
      background: linear-gradient(180deg, #ffb17d 0%, #ff9348 100%);
      box-shadow: 0 14px 28px rgba(255, 147, 72, 0.24);
    }

    .hint {
      position: absolute;
      top: calc(16px + env(safe-area-inset-top, 0px));
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      width: min(92vw, 420px);
      padding: 10px 14px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(20, 14, 10, 0.48);
      color: rgba(248, 242, 235, 0.82);
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
      text-align: center;
      font-size: 0.84rem;
      line-height: 1.6;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="surface" aria-hidden="true"></div>
    <div class="hint" id="hintText">iPhoneでは「ARで見る」を押すと純正ARが開きます。</div>
    <model-viewer
      id="viewer"
      src="./model.glb"
      alt="アクキー・アクスタ 3Dモデル"
      ar
      ar-modes="quick-look scene-viewer webxr"
      ar-scale="fixed"
      camera-controls
      touch-action="pan-y"
      interaction-prompt="none"
      exposure="1"
      shadow-intensity="1"
      environment-image="neutral"
      auto-rotate
      auto-rotate-delay="0"
      rotation-per-second="14deg"
      camera-orbit="0deg 75deg auto"
      min-camera-orbit="auto auto 45%"
      max-camera-orbit="auto auto 220%">
      <button slot="ar-button" id="ar-button">ARで見る</button>
    </model-viewer>
    <div class="cta-wrap" aria-hidden="true"></div>
  </div>

  <script>
    const hintText = document.getElementById("hintText");

    function updateHint() {
      const ua = navigator.userAgent || "";
      if (/iPhone|iPad|iPod/i.test(ua)) {
        hintText.textContent = "iPhoneでは「ARで見る」を押すと純正AR Quick Lookが開きます。";
        return;
      }
      if (/Android/i.test(ua)) {
        hintText.textContent = "Androidでは「ARで見る」で対応ARビューアを開きます。";
        return;
      }
      hintText.textContent = "このページはスマホ向けです。対応端末では「ARで見る」でARを開けます。";
    }

    updateHint();
  </script>
</body>
</html>
