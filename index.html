<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>アクキー・アクスタ AR</title>
  <meta
    name="description"
    content="iPhoneではQuick Lookで純正ARを開き、3Dモデルをそのまま空間に表示するミニマルな静的ページです。"
  />
  <link rel="icon" href="data:," />
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    :root {
      --bg: #120d09;
      --accent: #ff9d5c;
      --text: #f8f2eb;
      --line: rgba(255, 220, 187, 0.18);
      --shadow: 0 18px 46px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 80%, rgba(255, 157, 92, 0.12), transparent 20%),
        radial-gradient(circle at top, rgba(255, 157, 92, 0.1), transparent 34%),
        var(--bg);
    }

    body {
      font-family: "Hiragino Sans", "Noto Sans JP", "Segoe UI", sans-serif;
      color: var(--text);
    }

    .app {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    model-viewer {
      width: 100%;
      height: 100%;
      background: transparent;
      --poster-color: transparent;
    }

    .surface {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 72%, rgba(255, 186, 131, 0.03), transparent 16%),
        var(--bg);
    }

    model-viewer {
      position: relative;
      z-index: 1;
    }

    .cta-wrap {
      position: fixed;
      left: 50%;
      bottom: calc(20px + env(safe-area-inset-bottom, 0px));
      transform: translateX(-50%);
      z-index: 999;
      pointer-events: auto;
    }

    #launch-ar {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 148px;
      border: none;
      border-radius: 999px;
      padding: 14px 22px;
      font: inherit;
      font-weight: 800;
      color: #fff;
      background: linear-gradient(180deg, #ffb17d 0%, #ff9348 100%);
      box-shadow: 0 14px 28px rgba(255, 147, 72, 0.24);
      -webkit-appearance: none;
      appearance: none;
      touch-action: manipulation;
    }

    #ar-button {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip-path: inset(50%);
      border: 0;
      padding: 0;
      margin: 0;
    }

  </style>
</head>
<body>
  <div class="app">
    <div class="surface" aria-hidden="true"></div>
    <model-viewer
      id="viewer"
      src="./model-1_3_keychain_final.glb"
      alt="アクキー・アクスタ 3Dモデル"
      scale="0.025 0.025 0.025"
      ar
      ar-modes="quick-look scene-viewer webxr"
      ar-scale="fixed"
      camera-controls
      touch-action="pan-y"
      interaction-prompt="none"
      exposure="1"
      shadow-intensity="1"
      environment-image="neutral"
      auto-rotate
      auto-rotate-delay="0"
      rotation-per-second="14deg"
      camera-orbit="0deg 75deg auto"
      min-camera-orbit="auto auto 45%"
      max-camera-orbit="auto auto 220%">
      <button slot="ar-button" id="ar-button">ARで見る</button>
    </model-viewer>
    <div class="cta-wrap">
      <button id="launch-ar" type="button">ARで見る</button>
    </div>
  </div>
  <script>
    const launchButton = document.getElementById("launch-ar");
    const arButton = document.getElementById("ar-button");

    launchButton.addEventListener("click", () => {
      arButton.click();
    });
  </script>
</body>
</html>
