<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>アクキー・アクスタ カメラARプレビュー</title>
  <meta
    name="description"
    content="ページを開くとカメラを起動し、固定3Dモデルを映像の上に重ねて雰囲気を確認できる静的アプリです。"
  />
  <link rel="icon" href="data:," />
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    :root {
      --text: #f7f2eb;
      --muted: rgba(247, 242, 235, 0.78);
      --panel: rgba(21, 16, 12, 0.46);
      --panel-strong: rgba(18, 14, 10, 0.66);
      --line: rgba(255, 220, 181, 0.18);
      --accent: #ff9a56;
      --shadow: 0 20px 48px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      overflow: hidden;
      background: #140f0b;
      color: var(--text);
      font-family: "Hiragino Sans", "Noto Sans JP", "Segoe UI", sans-serif;
    }

    .app {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at top, rgba(255, 154, 86, 0.18), transparent 35%),
        #140f0b;
    }

    .camera-layer,
    .camera-layer video,
    .camera-fallback {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .camera-layer video {
      object-fit: cover;
      background: #0f0b08;
      transform: scaleX(-1);
    }

    .camera-layer[data-facing="environment"] video {
      transform: none;
    }

    .camera-fallback {
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
      background:
        linear-gradient(180deg, rgba(20, 15, 11, 0.3), rgba(20, 15, 11, 0.82)),
        radial-gradient(circle at 50% 40%, rgba(255, 154, 86, 0.22), transparent 32%);
    }

    .fallback-card {
      width: min(520px, 100%);
      padding: 22px;
      border-radius: 28px;
      background: rgba(17, 13, 10, 0.64);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .fallback-card h1 {
      margin: 0 0 10px;
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      line-height: 1.1;
    }

    .fallback-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .overlay-scene {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .model-anchor {
      position: absolute;
      left: 50%;
      top: 50%;
      width: min(64vw, 430px);
      aspect-ratio: 1 / 1;
      transform: translate3d(-50%, -50%, 0);
      pointer-events: auto;
      filter: drop-shadow(0 24px 42px rgba(0, 0, 0, 0.3));
    }

    model-viewer {
      width: 100%;
      height: 100%;
      background: transparent;
      --poster-color: transparent;
    }

    .top-ui {
      position: absolute;
      inset: env(safe-area-inset-top, 0) 0 auto 0;
      z-index: 20;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      padding: 16px;
      pointer-events: none;
    }

    .brand,
    .status {
      pointer-events: auto;
      padding: 12px 14px;
      border-radius: 18px;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .brand {
      max-width: min(540px, calc(100vw - 32px));
    }

    .eyebrow {
      display: block;
      margin-bottom: 5px;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #ffc89e;
      font-weight: 700;
    }

    .brand strong {
      display: block;
      font-size: 1.15rem;
      margin-bottom: 6px;
    }

    .brand span,
    .status {
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.6;
    }

    .bottom-sheet {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: calc(16px + env(safe-area-inset-bottom, 0px));
      z-index: 20;
      display: grid;
      gap: 12px;
      padding: 14px;
      border-radius: 24px;
      background: var(--panel-strong);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      align-items: end;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .field label {
      color: var(--muted);
      font-size: 0.8rem;
    }

    .field output {
      color: #fff0e6;
      font-weight: 700;
      font-size: 0.98rem;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 12px 16px;
      font: inherit;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      background: linear-gradient(180deg, #ffb075 0%, #ff8c43 100%);
      box-shadow: 0 12px 24px rgba(255, 140, 67, 0.22);
    }

    button.secondary {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid var(--line);
      box-shadow: none;
      color: var(--text);
    }

    .note {
      color: var(--muted);
      font-size: 0.76rem;
      line-height: 1.7;
    }

    @media (max-width: 920px) {
      .controls {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .brand strong {
        font-size: 1rem;
      }
    }

    @media (max-width: 560px) {
      .top-ui {
        flex-direction: column;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      .model-anchor {
        width: min(74vw, 380px);
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="camera-layer" id="cameraLayer" data-facing="environment">
      <video id="camera" autoplay playsinline muted></video>
      <div class="camera-fallback" id="cameraFallback">
        <div class="fallback-card">
          <h1>カメラを準備しています</h1>
          <p id="fallbackMessage">
            ページを開くとカメラを起動し、その映像の上に固定3Dモデルを重ねて表示します。
            許可ダイアログが出たらカメラアクセスを許可してください。
          </p>
        </div>
      </div>
    </div>

    <div class="overlay-scene">
      <div class="model-anchor" id="modelAnchor">
        <model-viewer
          id="viewer"
          src="./model.glb"
          alt="アクキー・アクスタ向け固定3Dモデル"
          interaction-prompt="none"
          exposure="1"
          shadow-intensity="0"
          environment-image="neutral"
          camera-orbit="0deg 75deg auto"
          disable-zoom>
        </model-viewer>
      </div>
    </div>

    <div class="top-ui">
      <div class="brand">
        <span class="eyebrow">Camera Preview</span>
        <strong>アクキー・アクスタ カメラARプレビュー</strong>
        <span>ページアクセス時にカメラを起動し、固定モデルを映像の上に重ねて雰囲気を確認します。</span>
      </div>
      <div class="status" id="statusText">カメラ起動待ち</div>
    </div>

    <div class="bottom-sheet">
      <div class="controls">
        <div class="field">
          <label for="sizeRange">モデルサイズ</label>
          <input id="sizeRange" type="range" min="140" max="520" step="1" value="260" />
          <output id="sizeValue">260 px</output>
        </div>
        <div class="field">
          <label for="heightRange">上下位置</label>
          <input id="heightRange" type="range" min="-220" max="220" step="1" value="18" />
          <output id="heightValue">18 px</output>
        </div>
        <div class="field">
          <label for="yawRange">見せる角度</label>
          <input id="yawRange" type="range" min="-180" max="180" step="1" value="0" />
          <output id="yawValue">0°</output>
        </div>
        <div class="field">
          <label for="spinRange">自動回転</label>
          <input id="spinRange" type="range" min="0" max="40" step="1" value="10" />
          <output id="spinValue">10°/s</output>
        </div>
      </div>
      <div class="actions">
        <button id="retryCamera">カメラを再起動</button>
        <button class="secondary" id="flipCamera">背面/前面を切替</button>
        <button class="secondary" id="centerModel">位置を中央に戻す</button>
      </div>
      <div class="note">
        この方式はカメラ映像への重ね表示です。床検出や空間固定までは行わないため、実寸の最終確認は WebXR / Scene Viewer / Quick Look の端末ARで行うのがおすすめです。
      </div>
    </div>
  </div>

  <script>
    const camera = document.getElementById("camera");
    const cameraLayer = document.getElementById("cameraLayer");
    const cameraFallback = document.getElementById("cameraFallback");
    const fallbackMessage = document.getElementById("fallbackMessage");
    const statusText = document.getElementById("statusText");
    const viewer = document.getElementById("viewer");
    const modelAnchor = document.getElementById("modelAnchor");
    const sizeRange = document.getElementById("sizeRange");
    const sizeValue = document.getElementById("sizeValue");
    const heightRange = document.getElementById("heightRange");
    const heightValue = document.getElementById("heightValue");
    const yawRange = document.getElementById("yawRange");
    const yawValue = document.getElementById("yawValue");
    const spinRange = document.getElementById("spinRange");
    const spinValue = document.getElementById("spinValue");
    const retryCamera = document.getElementById("retryCamera");
    const flipCamera = document.getElementById("flipCamera");
    const centerModel = document.getElementById("centerModel");

    let currentFacingMode = "environment";
    let cameraStream = null;

    function setStatus(message) {
      statusText.textContent = message;
    }

    function stopCamera() {
      if (!cameraStream) {
        return;
      }

      for (const track of cameraStream.getTracks()) {
        track.stop();
      }

      cameraStream = null;
    }

    async function startCamera() {
      stopCamera();
      setStatus("カメラを起動しています");
      cameraFallback.hidden = false;
      fallbackMessage.textContent =
        "カメラを起動中です。許可ダイアログが出たらアクセスを許可してください。";

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        setStatus("このブラウザではカメラを使えません");
        fallbackMessage.textContent =
          "このブラウザまたは環境では getUserMedia が使えません。HTTPS または localhost で開いてください。";
        return;
      }

      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: currentFacingMode },
            width: { ideal: 1280 },
            height: { ideal: 720 }
          },
          audio: false
        });

        camera.srcObject = stream;
        cameraStream = stream;
        cameraLayer.dataset.facing = currentFacingMode;
        cameraFallback.hidden = true;
        setStatus(currentFacingMode === "environment" ? "背面カメラ表示中" : "前面カメラ表示中");
      } catch (error) {
        const message = error && error.name ? error.name : "CameraError";
        setStatus("カメラを起動できませんでした");
        fallbackMessage.textContent =
          `カメラアクセスに失敗しました (${message})。ブラウザ設定でカメラを許可してから再試行してください。`;
      }
    }

    function applyOverlayControls() {
      const size = Number(sizeRange.value);
      const offsetY = Number(heightRange.value);
      const yaw = Number(yawRange.value);
      const spin = Number(spinRange.value);

      modelAnchor.style.width = `${size}px`;
      modelAnchor.style.transform = `translate3d(-50%, calc(-50% + ${offsetY}px), 0)`;
      viewer.cameraOrbit = `${yaw}deg 75deg auto`;

      if (spin > 0) {
        viewer.setAttribute("auto-rotate", "");
        viewer.setAttribute("rotation-per-second", `${spin}deg`);
      } else {
        viewer.removeAttribute("auto-rotate");
      }

      sizeValue.textContent = `${size}px`;
      heightValue.textContent = `${offsetY}px`;
      yawValue.textContent = `${yaw}°`;
      spinValue.textContent = `${spin}°/s`;
    }

    function resetOverlayPosition() {
      sizeRange.value = "260";
      heightRange.value = "18";
      yawRange.value = "0";
      spinRange.value = "10";
      applyOverlayControls();
    }

    retryCamera.addEventListener("click", startCamera);
    flipCamera.addEventListener("click", async () => {
      currentFacingMode = currentFacingMode === "environment" ? "user" : "environment";
      await startCamera();
    });
    centerModel.addEventListener("click", resetOverlayPosition);

    sizeRange.addEventListener("input", applyOverlayControls);
    heightRange.addEventListener("input", applyOverlayControls);
    yawRange.addEventListener("input", applyOverlayControls);
    spinRange.addEventListener("input", applyOverlayControls);

    viewer.addEventListener("load", () => {
      setStatus(`${statusText.textContent} / モデル読込完了`);
    });

    viewer.addEventListener("error", () => {
      setStatus("モデルの読み込みに失敗しました");
      fallbackMessage.textContent =
        "固定3Dモデルの読み込みに失敗しました。`model.glb` が同じ場所にあるか確認してください。";
      cameraFallback.hidden = false;
    });

    applyOverlayControls();
    startCamera();

    window.addEventListener("beforeunload", stopCamera);
  </script>
</body>
</html>
